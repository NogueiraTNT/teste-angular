<div class="flex min-h-dvh flex-col">
  <!-- Barra superior: mobile-first, área de toque confortável -->
  <header
    class="sticky top-0 z-10 flex min-h-[3.25rem] items-center justify-between gap-3 border-b border-zinc-800/90 bg-zinc-950/95 px-4 py-3 backdrop-blur-md supports-[padding:max(0px)]:pt-[max(0.75rem,env(safe-area-inset-top))] supports-[padding:max(0px)]:pl-[max(1rem,env(safe-area-inset-left))] supports-[padding:max(0px)]:pr-[max(1rem,env(safe-area-inset-right))]"
    role="banner"
  >
    <span class="truncate text-sm font-medium tracking-tight text-zinc-300">RWP</span>
    <button
      type="button"
      class="inline-flex min-h-11 min-w-[5.5rem] shrink-0 items-center justify-center rounded-lg border border-zinc-600 bg-zinc-900/80 px-4 text-sm font-medium text-zinc-100 transition-colors hover:bg-zinc-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-500 disabled:pointer-events-none disabled:opacity-50 active:scale-[0.98] motion-safe:duration-150 sm:min-h-10"
      (click)="logout()"
      [disabled]="signingOut()"
      [attr.aria-busy]="signingOut()"
      aria-label="Sair da conta"
    >
      <span *ngIf="signingOut()" class="inline-flex items-center gap-2">
        <svg
          class="h-4 w-4 shrink-0 animate-spin motion-reduce:animate-none"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        Saindo…
      </span>
      <span *ngIf="!signingOut()">Sair</span>
    </button>
  </header>

  <main
    class="relative isolate flex flex-1 flex-col overflow-x-hidden overflow-y-auto px-4 py-8"
    role="main"
  >
    <div
      class="pointer-events-none fixed inset-0 -z-10 bg-gradient-to-b from-black via-zinc-950 to-neutral-950"
      aria-hidden="true"
    ></div>
    <div
      class="pointer-events-none fixed left-1/2 top-1/4 -z-10 h-[min(50vh,20rem)] w-[min(90vw,24rem)] -translate-x-1/2 rounded-full bg-zinc-500/10 blur-3xl"
      aria-hidden="true"
    ></div>

    <div class="mx-auto w-full max-w-2xl motion-safe:animate-login-enter motion-reduce:animate-none">
      <div class="mb-8 text-center">
        <p class="mb-2 text-xs font-medium uppercase tracking-[0.2em] text-zinc-500">Área interna</p>
        <h1 class="text-balance text-3xl font-semibold tracking-tight text-white sm:text-4xl">
          Hello World
        </h1>
      </div>

      <!-- Estados: carregando / erro / sem sessão -->
      <div
        *ngIf="loadingDados()"
        class="flex min-h-[8rem] items-center justify-center rounded-xl border border-zinc-800 bg-zinc-950/60 px-4 py-8 text-sm text-zinc-400"
        role="status"
        aria-live="polite"
      >
        <span class="inline-flex items-center gap-2">
          <svg
            class="h-5 w-5 shrink-0 animate-spin motion-reduce:animate-none"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
          Carregando dados…
        </span>
      </div>

      <div
        *ngIf="!loadingDados() && semUsuarioAuth()"
        class="rounded-xl border border-amber-900/50 bg-amber-950/30 px-4 py-3 text-sm text-amber-200/90"
        role="alert"
      >
        Não foi possível identificar o usuário. Faça login novamente.
      </div>

      <div
        *ngIf="!loadingDados() && loadError()"
        class="rounded-xl border border-red-900/50 bg-red-950/40 px-4 py-3 text-sm text-red-300"
        role="alert"
      >
        {{ loadError() }}
      </div>

      <!-- Lista de documentos -->
      <section *ngIf="!loadingDados() && !semUsuarioAuth() && !loadError()" aria-labelledby="dados-heading">
        <h2 id="dados-heading" class="sr-only">Registros do banco</h2>

        <p
          *ngIf="usuarios().length === 0"
          class="rounded-xl border border-zinc-800 bg-zinc-950/50 px-4 py-6 text-center text-sm text-zinc-400"
        >
          Nenhum documento em <span class="font-mono text-zinc-300">users</span> com o seu e-mail.
        </p>

        <ul *ngIf="usuarios().length > 0" class="flex flex-col gap-4">
          <li *ngFor="let doc of usuarios(); trackBy: trackById">
            <article
              class="rounded-xl border border-zinc-800/90 bg-zinc-950/70 p-4 shadow-lg shadow-black/20 backdrop-blur-sm sm:p-5"
            >
              <p class="mb-3 text-xs font-medium uppercase tracking-wider text-zinc-500">Documento</p>
              <p class="mb-4 break-all font-mono text-sm text-zinc-200">{{ doc.id }}</p>
              <dl class="divide-y divide-zinc-800/90">
                <ng-container *ngFor="let kv of doc | keyvalue">
                  <div
                    *ngIf="kv.key !== 'id'"
                    class="flex flex-col gap-1 py-3 first:pt-0 last:pb-0 sm:flex-row sm:items-start sm:justify-between sm:gap-4"
                  >
                    <dt class="shrink-0 text-xs font-medium text-zinc-500">{{ kv.key }}</dt>
                    <dd class="min-w-0 break-words text-sm text-zinc-200 sm:text-right">{{ formatCampo(kv.value) }}</dd>
                  </div>
                </ng-container>
              </dl>
            </article>
          </li>
        </ul>
      </section>
    </div>
  </main>
</div>
