<div class="flex min-h-dvh flex-col">
  <!-- Barra superior: mobile-first, área de toque confortável -->
  <header
    class="sticky top-0 z-10 flex min-h-[3.25rem] items-center justify-between gap-3 border-b border-zinc-800/90 bg-zinc-950/95 px-4 py-3 backdrop-blur-md supports-[padding:max(0px)]:pt-[max(0.75rem,env(safe-area-inset-top))] supports-[padding:max(0px)]:pl-[max(1rem,env(safe-area-inset-left))] supports-[padding:max(0px)]:pr-[max(1rem,env(safe-area-inset-right))]"
    role="banner"
  >
    <span class="truncate text-sm font-medium tracking-tight text-zinc-300">RWP</span>
    <button
      type="button"
      class="inline-flex min-h-11 min-w-[5.5rem] shrink-0 items-center justify-center rounded-lg border border-zinc-600 bg-zinc-900/80 px-4 text-sm font-medium text-zinc-100 transition-colors hover:bg-zinc-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-500 disabled:pointer-events-none disabled:opacity-50 active:scale-[0.98] motion-safe:duration-150 sm:min-h-10"
      (click)="logout()"
      [disabled]="signingOut"
      [attr.aria-busy]="signingOut"
      aria-label="Sair da conta"
    >
      <span *ngIf="signingOut" class="inline-flex items-center gap-2">
        <svg
          class="h-4 w-4 shrink-0 animate-spin motion-reduce:animate-none"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        Saindo…
      </span>
      <span *ngIf="!signingOut">Sair</span>
    </button>
  </header>

  <main
    class="relative isolate flex flex-1 flex-col items-center justify-center overflow-hidden px-4 py-10"
    role="main"
  >
    <div
      class="pointer-events-none absolute inset-0 -z-10 bg-gradient-to-b from-black via-zinc-950 to-neutral-950"
      aria-hidden="true"
    ></div>
    <div
      class="pointer-events-none absolute left-1/2 top-1/4 -z-10 h-[min(50vh,20rem)] w-[min(90vw,24rem)] -translate-x-1/2 rounded-full bg-zinc-500/10 blur-3xl"
      aria-hidden="true"
    ></div>

    <div class="mx-auto max-w-lg text-center motion-safe:animate-login-enter motion-reduce:animate-none">
      <p class="mb-3 text-xs font-medium uppercase tracking-[0.2em] text-zinc-500">Área interna</p>
      <h1 class="text-balance text-4xl font-semibold tracking-tight text-white sm:text-5xl">
        Hello World
      </h1>
      <p class="mt-4 text-pretty text-base leading-relaxed text-zinc-400 sm:text-lg">
        Login concluído com sucesso. Você está na área interna.
      </p>
    </div>
  </main>
</div>
